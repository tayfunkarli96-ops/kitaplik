openapi: 3.0.3
info:
  title: Cornflix Film ve İçerik Yönetim API'si
  version: 1.0.0
  description: Cornflix platformu için Admin, Kayıtlı Kullanıcı ve Misafir rollerini kapsayan 10 gereksinimli API tasarımı.

paths:
  /api/users/{userid}:
    put:
      summary: 1. Profil Düzenleme (Kayıtlı Kullanıcı)
      parameters:
        - name: userid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Profil güncellendi.

  /api/movies/{movieid}:
    put:
      summary: 2. Film Güncelleme (Admin)
      parameters:
        - name: movieid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Film güncellendi.

  /api/people/{personid}:
    get:
      summary: 3. Oyuncu/Yönetmen Bilgisi Görüntüleme (Tümü)
      parameters:
        - name: personid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Kişi bilgileri getirildi.

  /api/movies:
    get:
      summary: 4. Gelişmiş Film Filtreleme (Tümü)
      parameters:
        - name: genre
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Filtrelenmiş liste getirildi.

  /api/comments/{commentid}:
    put:
      summary: 5. Yorum Düzenleme (Kayıtlı Kullanıcı)
      parameters:
        - name: commentid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Yorum güncellendi.

  /api/users/{userid}/watchlist:
    post:
      summary: 6. İzlenecekler Listesine Ekleme (Kayıtlı Kullanıcı)
      parameters:
        - name: userid
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Listeye eklendi.

  /api/comments/{commentid}/approve:
    patch:
      summary: 7. Yorum Onaylama (Admin)
      parameters:
        - name: commentid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Yorum onaylandı.

  /api/quiz/recommend:
    post:
      summary: 8. Film Testi / Quiz ile Önerme (Tümü)
      responses:
        '200':
          description: Öneriler getirildi.

  /api/news/{newsid}:
    put:
      summary: 9. Haber Düzenleme (Admin)
      parameters:
        - name: newsid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Haber güncellendi.

  /api/settings/language:
    get:
      summary: 10. Çoklu Dil Desteği Seçenekleri (Tümü)
      responses:
        '200':
          description: Mevcut dil seçenekleri listelendi.
